name: Deploy Dashboard
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Dereference symlinks in output
        run: |
          cp -rL dashboard/ dashboard-clean/
          rm -rf dashboard/
          mv dashboard-clean/ dashboard/
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dashboard/
      - id: deployment
        uses: actions/deploy-pages@v4
